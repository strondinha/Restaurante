services:
  db:
    image: mysql:8.0
    container_name: restaurante_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurante
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - ./database/bd.sql:/docker-entrypoint-initdb.d/01-bd.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  adminer:
    image: adminer:latest
    container_name: restaurante_adminer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  db_data:
